<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0C0C0F; --border: #222;
    --text: #f0ede8; --muted: #888;
    --font: 'Inter', sans-serif;

  body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; }

  /* NAV */
  nav {

    padding: 24px 48px; position: sticky; top: 0; z-index: 100;
    background: var(--bg);
  }

  .nav-name:hover { transform: rotate(90deg); }
  .nav-name:active { animation: bounce .4s ease; }
  @keyframes bounce {
    0% { transform: rotate(90deg) scale(1); }
    30% { transform: rotate(90deg) scale(1.4); }
    60% { transform: rotate(90deg) scale(.9); }
    100% { transform: rotate(90deg) scale(1); }
  }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text); text-decoration: none; transition: color .2s; padding: 8px 16px; border-radius: 100px; border: 1px solid transparent; font-weight: 500; }
  .nav-links a:hover { border-color: var(--border); }

  .project-link { color: rgba(255, 255, 255, 0.7); text-decoration: none; transition: color 0.2s; }
  .project-link:hover { color: #fff; }
